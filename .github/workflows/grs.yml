name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=highcontrast&title_color=ffbb00&text_color=00bfff&hide_border=true&locale=en&card_width=450
          path: profile/stats.svg
          token: ${{ secrets.PAT }}
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&show_icons=true&locale=en&layout=compact&theme=highcontrast&title_color=ffbb00&text_color=00bfff&hide_border=true&card_width=350
          path: profile/top-langs.svg
          token: ${{ secrets.PAT }}
      - name: Generate Profile Trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          file: profile/trophy.svg
          token: ${{ secrets.PAT }}
          theme: matrix
          # cols: -1
          # rows: 10
          # panel-size: 115
          # margin-width: 10
          # margin-height: 10
          no-background: false
          no-frame: true
      - name: Generate Streak Stats
        uses: electricsteve/github-readme-streak-stats-action@v1.1.0
        with:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.PAT }}
          THEME: highcontrast
          OUTPUT_PATH: profile/streak-stats.svg
          HIDE_BORDER: true
          DATE_FORMAT: j/n[/Y]
          CARD_WIDTH: 800
          # BACKGROUND: 45,000C9B,707F00
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards (daily)" || exit 0
          git push