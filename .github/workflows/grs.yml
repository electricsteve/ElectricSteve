name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=highcontrast&title_color=ffbb00&text_color=00bfff&hide_border=true&locale=en
          path: profile/stats.svg
          token: ${{ secrets.PAT }}
      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&show_icons=true&locale=en&layout=compact&theme=highcontrast&title_color=ffbb00&text_color=00bfff&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.PAT }}
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards (daily)" || exit 0
          git push